<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0071e3">
<link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.svg">

<!-- JSON-LD -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "パスワードツール｜ツール置き場",
  "description": "安全なパスワードの生成と強度チェックができる無料ツール",
  "applicationCategory": "UtilitiesApplication",
  "operatingSystem": "Any",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "JPY"
  }
}
</script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<a class="skip-link" href="#main">本文へスキップ</a>

<header class="site-header">
  <div class="container header-inner">
    <div class="brand-area">
      <a class="back-link" href="https://ai-kaihatsubu.github.io/">← ツール置き場トップへ</a>
      <h1 class="logo" id="brand">パスワードツール</h1>
    </div>
    <nav class="header-actions" aria-label="表示設定">
      <button id="theme-toggle" type="button" aria-label="ダーク/ライトモード切替" aria-pressed="false">
        <span aria-hidden="true">🌙</span>
      </button>
    </nav>
  </div>
  <div class="container">
    <!-- app.js が SUITE_CONFIG.tabs からタブボタンを動的生成 -->
    <nav class="tab-nav" id="tab-bar" role="tablist" aria-label="ツール切替"></nav>
  </div>
</header>

<main id="main" class="container">
  <!-- app.js が SUITE_CONFIG.tabs からiframeパネルを動的生成。iframe内ツールの重複チロム(ヘッダー/お布施/広告/フッター)はapp.jsがCSSで非表示にする -->
  <div class="tool-panels" id="panels"></div>

  <!-- お布施（このページに1つだけ・全幅） -->
  <section class="ofuse-box" aria-labelledby="ofuse-heading">
    <h2 id="ofuse-heading">お布施（任意のご支援）</h2>
    <p>これらのツールはすべて無料でお使いいただけます。もしお役に立てたなら、よろしければ「お布施」で応援いただけると励みになります。<strong>お布施は任意のご支援（寄付）で、見返り（広告の非表示など）はありません。</strong>いただいたお布施は運営費に充てさせていただきます。</p>
    <button id="ofuse-button" type="button" class="btn btn-primary">お布施する（応援）</button>
    <p class="hint" id="ofuse-status" aria-live="polite"></p>
  </section>
</main>

<!-- 広告枠（コンテンツ下・ページレベル） -->
<div class="ad-slot ad-slot--bottom" data-ad-position="bottom" aria-hidden="true">
  <p class="ad-placeholder">広告スペース（準備中）</p>
</div>

<footer class="site-footer">
  <div class="container footer-inner">
    <nav aria-label="フッターリンク">
      <a href="privacy.html">プライバシーポリシー</a>
      <a href="terms.html">利用規約</a>
      <a href="operator.html">運営者情報</a>
    </nav>
    <p class="copyright">&copy; 2026 キュリオスモンスター</p>
  </div>
</footer>

<script src="config.js"></script>
<script src="monetization.js" defer></script>
<script src="app.js" defer></script>
<script>
  // PWA: Service Worker 登録（相対パスなのでサブパス公開でも scope が正しく効く）
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
</body>
</html>
